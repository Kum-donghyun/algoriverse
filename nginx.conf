# Nginx 설정 파일 - /etc/nginx/sites-available/algoriverse

upstream backend {
    # WAS 서버 (Node.js)
    server 127.0.0.1:5000;
    keepalive 64;
}

# HTTP -> HTTPS 리다이렉션 (SSL 사용 시)
# server {
#     listen 80;
#     server_name your-domain.com www.your-domain.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    # SSL 사용 시:
    # listen 443 ssl http2;
    # ssl_certificate /etc/ssl/certs/your-cert.crt;
    # ssl_certificate_key /etc/ssl/private/your-key.key;
    
    server_name your-domain.com www.your-domain.com;
    
    # 로그 파일
    access_log /var/log/nginx/algoriverse-access.log;
    error_log /var/log/nginx/algoriverse-error.log;
    
    # 클라이언트 요청 크기 제한
    client_max_body_size 20M;
    
    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;
    
    # 정적 파일 (React 빌드 결과물)
    location / {
        root /home/USERNAME/algoriverse/front/dist;
        try_files $uri $uri/ /index.html;
        
        # 캐싱 설정
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
    
    # API 요청은 Backend로 프록시
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        
        # 프록시 헤더
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 타임아웃 설정
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 캐시 비활성화
        proxy_cache_bypass $http_upgrade;
    }
    
    # Health Check 엔드포인트
    location /health {
        proxy_pass http://backend/health;
        access_log off;
    }
    
    # 정적 리소스 캐싱
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /home/USERNAME/algoriverse/front/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
}
